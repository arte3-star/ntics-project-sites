# Planilhas operacionais Drive monitoradas pelo sync. O sync baixa a cada run,
# diffa contra cache por aba, e avisa quando alguma aba tem novas linhas preenchidas.
planilhas_monitoradas:
  - nome: planilha-operacional-132
    file_id: "1oJ1PIgaaBSBrkGlbpYtovGHYqmdhzwAm"
    url: "https://docs.google.com/spreadsheets/d/1oJ1PIgaaBSBrkGlbpYtovGHYqmdhzwAm/edit"
    papel: Planilha operacional do 132 mantida pela equipe NTICS
    abas:
      - ENGAJAMENTO: cadastro de parceiros locais por cidade (empresa, contato, cargo, registro, telefone, email, termo adesao, grade alunos)
      - FINALIZACAO: atividades por escola/zona (data, cidade, escola, qtd alunos, turno, serie, PCD)
      - GRADE DE EXECUCAO: cronograma fechado por cidade e trilha (data inicio/fim, trilha, meta alunos, horario, carga horaria, local)
      - FORNECEDORES: fornecedor, nome, contato, valor
      - CHECK LIST DE COMPRAS: quantidade, item, valor
    cache_local: brief/planilha-engajamento.xlsx
