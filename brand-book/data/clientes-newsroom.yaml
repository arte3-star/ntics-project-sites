# Politica de fallback
fallback:
  min_noticias_cliente: 0  # 0 = se nenhum cliente tem noticia da semana, roda fluxo ESG generico normal
  max_noticias_totais: 8   # max cards de noticia por carrossel (sem contar capa + CTA)
  target_noticias_totais: 7  # alvo padrao = 7 noticias (capa + 7 + CTA = 9 cards)
