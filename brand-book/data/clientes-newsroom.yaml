# Mapa cliente NTICS -> dominio para busca de noticias ESG semanais
# Usado pelo pipeline de carrossel de noticias (tools/content-gen/gerar_carrossel_noticias_v2.py)
#
# Fluxo: Serper /news com "site:{dominio} ESG sustentabilidade" por cliente, em paralelo.
# Fallback: se nenhum cliente tiver noticia da semana, cai pro fluxo ESG generico.
#
# Ordem = prioridade (mais projetos NTICS primeiro; depois marca forte em ESG).

clientes:
  - nome: Boticario
    dominio: grupoboticario.com.br
    aliases: ["Grupo Boticario", "Boticario"]
  - nome: Whirlpool
    dominio: whirlpool.com.br
    aliases: ["Whirlpool", "Consul", "Brastemp"]
  - nome: CNH Industrial
    dominio: cnhindustrial.com
    aliases: ["CNH", "CNH Industrial", "Case IH", "New Holland"]
  - nome: Rabobank
    dominio: rabobank.com.br
    aliases: ["Rabobank Brasil", "Rabobank"]
  - nome: Samarco
    dominio: samarco.com
    aliases: ["Samarco Mineracao", "Samarco"]
  - nome: Statkraft
    dominio: statkraft.com.br
    aliases: ["Statkraft Brasil", "Statkraft"]
  - nome: Repsol
    dominio: repsol.com.br
    aliases: ["Repsol Sinopec", "Repsol"]
  - nome: Bayer
    dominio: bayer.com.br
