#   slug             → nome da pasta em output/marketing/carrosseis/cases/
#   nome             → título oficial do projeto
#   numero           → número interno NTICS
#   patrocinador     → empresa patrocinadora principal
#   lei              → Rouanet | Esporte | FIA | sem incentivo
#   ano              → ano de execução
#   categoria        → CODS | MHS | Negócios Culturais
#   relatorio_pdf    → link direto para o PDF (preferir /file/d/ID/view)
#                      se for pasta Drive, baixar o PDF manualmente
#   fotos_drive      → pasta Drive com fotos do projeto
#   video            → link do vídeo principal (YouTube ou Drive)
#   numeros          → dados verificados (fonte: planilha + relatório)
#   status_carrossel → pendente | feito | postado
#
